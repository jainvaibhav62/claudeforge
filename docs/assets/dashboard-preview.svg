      </circle>
      <text x="40" y="235" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#e8e9f0">code-reviewer</text>
      <text x="19" y="253" font-family="'Courier New',monospace" font-size="10" fill="#fbbf24">✏ Edit</text>
