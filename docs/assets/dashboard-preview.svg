      <rect x="10" y="134" width="198" height="68" rx="9" fill="#161820" stroke="#1a1d24" stroke-width="1"/>
      <circle cx="29" cy="154" r="4.5" fill="#4b5563"/>
      <text x="40" y="159" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#e8e9f0">claude</text>
      <text x="19" y="175" font-family="'Courier New',monospace" font-size="10" fill="#4b5563">idle</text>
