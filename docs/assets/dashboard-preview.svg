<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="outerClip"><rect width="1200" height="700" rx="14"/></clipPath>
    <clipPath id="mainClip"><rect y="96" width="1200" height="604" rx="0"/></clipPath>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0a0b0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heroGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0b0f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#outerClip)">
    <!-- ═══ BROWSER CHROME ════════════════════════════════════════════════ -->
    <rect width="1200" height="700" fill="#1c1e26"/>
    <rect width="1200" height="48" fill="#252830"/>
    <line x1="0" y1="48" x2="1200" y2="48" stroke="#0d0e12" stroke-width="1"/>

    <!-- Traffic lights -->
    <circle cx="24" cy="24" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="24" r="6" fill="#febc2e"/>
    <circle cx="64" cy="24" r="6" fill="#28c840"/>

    <!-- URL bar -->
    <rect x="120" y="10" width="380" height="28" rx="7" fill="#161820" stroke="#2a2d38" stroke-width="1"/>
    <text x="310" y="29" font-family="'Courier New',monospace" font-size="12" fill="#6b7280" text-anchor="middle">localhost:7337</text>

    <!-- ═══ DASHBOARD HEADER ═══════════════════════════════════════════════ -->
    <rect y="48" width="1200" height="48" fill="#111318"/>
    <line x1="0" y1="96" x2="1200" y2="96" stroke="#1a1d24" stroke-width="1"/>

    <!-- Logo -->
    <text x="20" y="80" font-family="'Courier New',monospace" font-size="15" font-weight="700" fill="#a78bfa">claudeforge</text>
    <text x="122" y="80" font-family="'Courier New',monospace" font-size="15" font-weight="400" fill="#4b5563">.watch</text>

    <!-- Live indicator -->
    <circle cx="174" cy="72" r="5" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.25;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="174" cy="72" r="9" fill="#4ade80" opacity="0">
      <animate attributeName="r" values="5;11;5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0;0.35" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="186" y="77" font-family="'Courier New',monospace" font-size="12" fill="#4ade80">live</text>

    <!-- Event count -->
    <text x="1060" y="77" font-family="'Courier New',monospace" font-size="11" fill="#4b5563">247 events</text>

    <!-- Clear button -->
    <rect x="1148" y="59" width="40" height="22" rx="5" fill="none" stroke="#2a2d38" stroke-width="1"/>
    <text x="1168" y="74" font-size="11" fill="#6b7280" text-anchor="middle" font-family="system-ui,sans-serif">Clear</text>

