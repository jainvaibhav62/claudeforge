      <circle cx="29" cy="230" r="4.5" fill="#4ade80">
        <animate attributeName="r" values="4.5;6;4.5" dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.6;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="29" cy="230" r="4.5" fill="#4ade80" opacity="0.25">
