      <rect x="10" y="210" width="198" height="72" rx="9" fill="#161820" stroke="rgba(108,99,255,0.5)" stroke-width="1"/>
      <rect x="10" y="210" width="198" height="72" rx="9" fill="rgba(108,99,255,0.05)"/>
